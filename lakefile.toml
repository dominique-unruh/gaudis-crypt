name = "gaudis-crypt"
version = "0.1.0"
keywords = ["math", "cryptography", "formalization"]
defaultTargets = ["GaudisCrypt"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "Metatheory-Unruh"
git = "https://github.com/dominique-unruh/Lean-Metatheory.git"
rev = "main"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "GaudisCrypt"
